<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mando Remoto — ECUACIONES.io</title>
    <meta name="description" content="Control remoto para la presentación de Planteo de Ecuaciones">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --red: #e50914;
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --border: rgba(255,255,255,0.1);
            --text: #ffffff;
            --muted: #b3b3b3;
            --green: #46d369;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* ── Header ─────────────────────────────────────────────── */
        header {
            padding: 18px 20px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            position: sticky; top: 0; z-index: 10;
        }
        .logo {
            font-size: 1.15rem; font-weight: 800;
            color: var(--red); letter-spacing: -0.5px;
        }
        .logo span { color: #fff; }
        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #555;
            transition: background 0.4s;
            box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
        }
        .status-dot.connected { background: var(--green); box-shadow: 0 0 8px rgba(70,211,105,0.5); }
        .status-dot.connecting { background: #f59e0b; animation: blink 1s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

        /* ── Status Banner ──────────────────────────────────────── */
        #status-banner {
            text-align: center;
            font-size: 0.72rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            padding: 8px 16px;
            color: var(--muted);
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border);
        }
        #status-banner.ok { color: var(--green); }
        #status-banner.error { color: var(--red); }

        /* ── Trackpad ───────────────────────────────────────────── */
        .trackpad-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 14px 20px 8px;
            gap: 10px;
            width: 100%;
        }

        .trackpad-label {
            font-size: 0.65rem; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; color: var(--muted);
        }

        /* Container of trackpad + scrollpad */
        .trackpad-container {
            width: 100%;
            max-width: 340px;
            height: 250px; /* Taller touchpad region */
            display: flex;
            gap: 10px;
            align-items: stretch;
        }

        #trackpad {
            flex: 1;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 20px;
            position: relative;
            cursor: crosshair;
            touch-action: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            overflow: hidden;
        }
        #trackpad::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(229,9,20,0.04) 0%, transparent 70%);
            pointer-events: none;
        }
        #trackpad.active {
            border-color: rgba(229,9,20,0.6);
            box-shadow: 0 0 24px rgba(229,9,20,0.2), inset 0 0 40px rgba(229,9,20,0.03);
        }
        .trackpad-hint {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 8px; pointer-events: none;
            transition: opacity 0.3s;
        }
        .trackpad-hint i { font-size: 2rem; color: rgba(255,255,255,0.08); }
        .trackpad-hint p { font-size: 0.7rem; color: rgba(255,255,255,0.12); letter-spacing: 1px; }
        #trackpad.active .trackpad-hint { opacity: 0; }

        /* Laser cursor dot on trackpad */
        #laser-cursor {
            position: absolute;
            width: 18px; height: 18px;
            background: var(--red);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 16px 6px rgba(229,9,20,0.65);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            top: 50%; left: 50%;
        }
        #trackpad.active #laser-cursor { opacity: 1; }

        /* Scroll pad slider next to trackpad */
        #scrollpad {
            width: 55px;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 20px;
            position: relative;
            touch-action: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        #scrollpad.active {
            border-color: rgba(229,9,20,0.6);
            box-shadow: 0 0 20px rgba(229,9,20,0.15);
        }

        /* ── Nav Buttons ────────────────────────────────────────── */
        .nav-section {
            padding: 0 20px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .nav-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn {
            display: flex; align-items: center; justify-content: center;
            gap: 8px;
            padding: 12px 10px; /* More compact buttons */
            border: none; border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.82rem; font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s, opacity 0.2s;
            -webkit-tap-highlight-color: transparent;
            letter-spacing: 0.3px;
        }
        .btn:active { transform: scale(0.95); }

        .btn-prev {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-next {
            background: var(--text);
            color: #000;
        }
        .btn-start {
            background: var(--red);
            color: var(--text);
            grid-column: 1 / -1;
        }
        .btn-exit {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            grid-column: 1 / -1;
            padding: 10px;
            font-size: 0.72rem;
        }

        .btn:hover { opacity: 0.88; }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; }

        /* Ripple effect */
        .btn { position: relative; overflow: hidden; }
        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            background: rgba(255,255,255,0.25);
            animation: rippleAnim 0.5s linear;
            pointer-events: none;
        }
        @keyframes rippleAnim { to { transform: scale(4); opacity: 0; } }

        /* ── Footer ─────────────────────────────────────────────── */
        footer {
            text-align: center;
            padding: 12px;
            font-size: 0.6rem; color: rgba(255,255,255,0.15);
            letter-spacing: 1px; text-transform: uppercase;
        }

        /* Switch UI para el Puntero Absoluto/Relativo */
        .mando-switch-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 340px;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        .mando-switch-label {
            font-size: 0.72rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--muted);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .mando-switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }
        .mando-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .mando-slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: #333;
            transition: .3s;
            border-radius: 34px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .mando-slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .mando-slider {
            background-color: var(--red);
        }
        input:checked + .mando-slider:before {
            transform: translateX(22px);
        }
    </style>
</head>
<body>

<header>
    <div class="logo">ECUACIONES<span>.io</span></div>
    <div id="status-dot" class="status-dot connecting" title="Estado de conexión"></div>
</header>

<div id="status-banner">Conectando al servidor...</div>

<div class="trackpad-section">
    <span class="trackpad-label"><i class="fa-solid fa-crosshairs" style="margin-right:6px;"></i>Área del Puntero Láser</span>
    <div class="mando-switch-container">
        <span class="mando-switch-label"><i class="fa-solid fa-wand-magic-sparkles"></i> Puntero Absoluto</span>
        <label class="mando-switch">
            <input type="checkbox" id="puntero-modo-abs" onchange="togglePunteroModo(this.checked)">
            <span class="mando-slider"></span>
        </label>
    </div>
    <div class="trackpad-container">
        <div id="trackpad">
            <div class="trackpad-hint">
                <i class="fa-regular fa-hand-pointer"></i>
                <p>Desliza el dedo aquí</p>
            </div>
            <div id="laser-cursor"></div>
        </div>
        <div id="scrollpad">
            <i class="fa-solid fa-chevron-up" style="color: rgba(255,255,255,0.15);"></i>
            <span style="font-size: 0.55rem; color: rgba(255,255,255,0.2); font-weight: bold; writing-mode: vertical-lr; text-transform: uppercase; letter-spacing: 2px;">Scroll</span>
            <i class="fa-solid fa-chevron-down" style="color: rgba(255,255,255,0.15);"></i>
        </div>
    </div>
    <span style="font-size:0.62rem;color:rgba(255,255,255,0.2);letter-spacing:1px;">ARRASTRAR = MOVER PUNTERO</span>
</div>

<div class="nav-section">
    <div class="nav-row">
        <button class="btn btn-prev" id="btn-prev" onclick="sendNav('prev')">
            <i class="fa-solid fa-chevron-left"></i> Anterior
        </button>
        <button class="btn btn-next" id="btn-next" onclick="sendNav('next')">
            Siguiente <i class="fa-solid fa-chevron-right"></i>
        </button>
    </div>
    <div class="nav-row">
        <button class="btn btn-start" id="btn-start" onclick="sendCommand('start-presentation')">
            <i class="fa-solid fa-play"></i> Iniciar Presentación
        </button>
    </div>
    <div class="nav-row">
        <button class="btn btn-exit" id="btn-exit" onclick="sendCommand('exit-presentation')">
            <i class="fa-solid fa-compress"></i> Salir del Modo Presentación
        </button>
    </div>
</div>

<div class="nav-section" style="margin-top:4px;">
    <!-- Status: fase actual -->
    <div id="torneo-fase-banner" style="
        text-align:center; font-size:0.65rem; font-weight:700;
        letter-spacing:1.5px; text-transform:uppercase;
        padding:7px 14px; border-radius:10px;
        background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
        color:#6d6d6e;
    ">Torneo: cargando...</div>

    <!-- Título sección torneo -->
    <div style="font-size:0.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#6d6d6e;text-align:center;">
        🎮 Control del Torneo
    </div>

    <div class="nav-row">
        <button class="btn btn-prev" id="btn-t-lobby" onclick="sendTorneoCmd('lobby')" title="Ir al Lobby">
            <i class="fa-solid fa-house"></i> Lobby
        </button>
        <button class="btn btn-next" id="btn-t-pregunta" onclick="sendTorneoCmd('pregunta')" title="Lanzar Pregunta">
            <i class="fa-solid fa-play"></i> Pregunta
        </button>
    </div>
    <div class="nav-row">
        <button class="btn btn-start" id="btn-t-lb" onclick="sendTorneoCmd('leaderboard')">
            <i class="fa-solid fa-trophy"></i> Tabla de Posiciones
        </button>
    </div>
    <div class="nav-row">
        <button class="btn btn-prev" id="btn-t-next" onclick="sendTorneoCmd('next-question')">
            <i class="fa-solid fa-forward-step"></i> Sig. Pregunta
        </button>
        <button class="btn btn-exit" id="btn-t-reset" onclick="sendTorneoCmd('reset-tournament')" style="color:#e50914;border-color:rgba(229,9,20,0.3);">
            <i class="fa-solid fa-rotate-left"></i> Reset
        </button>
    </div>
</div>

<footer>ECUACIONES.io · Mando Remoto · Supabase Realtime</footer>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://dyuadrzdrphzywbnxnhz.supabase.co';
// Nota: Esta es la clave anónima (pública) segura para exponer en el frontend.
const SUPABASE_KEY  = 'sb_publishable_rCwOvgVa1kGlO5PFAa8tRg_E1KIWKWX';
const CHANNEL_NAME  = 'presentation-planteo-ecuaciones';

// ── Init Supabase channel ────────────────────────────────────────────────────
const client  = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const channel = client.channel(CHANNEL_NAME);

const statusDot    = document.getElementById('status-dot');
const statusBanner = document.getElementById('status-banner');

channel.subscribe((status) => {
    if (status === 'SUBSCRIBED') {
        statusDot.className = 'status-dot connected';
        statusBanner.textContent = '✅ Conectado — listo para controlar';
        statusBanner.className = 'ok';
    } else if (status === 'CHANNEL_ERROR') {
        statusDot.className = 'status-dot';
        statusBanner.textContent = '❌ Error de conexión';
        statusBanner.className = 'error';
    } else {
        statusDot.className = 'status-dot connecting';
        statusBanner.textContent = 'Conectando...';
        statusBanner.className = '';
    }
});

// ── Navigation commands ──────────────────────────────────────────────────────
function sendNav(direction) {
    channel.send({ type: 'broadcast', event: 'navigate', payload: { direction } });
    rippleEffect(direction === 'next' ? document.getElementById('btn-next') : document.getElementById('btn-prev'));
}

function sendCommand(event) {
    channel.send({ type: 'broadcast', event, payload: {} });
    const btn = event === 'start-presentation' ? document.getElementById('btn-start') : document.getElementById('btn-exit');
    rippleEffect(btn);
}

// ── Laser Trackpad ───────────────────────────────────────────────────────────
const trackpad    = document.getElementById('trackpad');
const laserCursor = document.getElementById('laser-cursor');
let lastTouch = null;
let throttleTimer = null;
const THROTTLE_MS = 30; // ~33fps max send rate
let isAbsoluteMode = false;

function togglePunteroModo(checked) {
    isAbsoluteMode = checked;
}

function handleTrackpadMove(clientX, clientY) {
    const rect = trackpad.getBoundingClientRect();
    // Clamp position within trackpad
    const relX = Math.max(0, Math.min(clientX - rect.left, rect.width));
    const relY = Math.max(0, Math.min(clientY - rect.top, rect.height));

    // Move local cursor dot
    laserCursor.style.left  = relX + 'px';
    laserCursor.style.top   = relY + 'px';

    if (throttleTimer === null) {
        throttleTimer = setTimeout(() => { throttleTimer = null; }, THROTTLE_MS);
        if (isAbsoluteMode) {
            const pctX = relX / rect.width;
            const pctY = relY / rect.height;
            channel.send({ type: 'broadcast', event: 'laser-absolute', payload: { x: pctX, y: pctY } });
        } else if (lastTouch) {
            const dx = (clientX - lastTouch.x) / rect.width;
            const dy = (clientY - lastTouch.y) / rect.height;
            if (Math.abs(dx) > 0.001 || Math.abs(dy) > 0.001) {
                channel.send({ type: 'broadcast', event: 'laser-move', payload: { dx, dy } });
            }
        }
    }
    lastTouch = { x: clientX, y: clientY };
}

// Click & Scroll & Move handling for Trackpad + Scrollpad
let touchStartTime = 0;
let touchStartX = 0;
let touchStartY = 0;
let hasMovedSignificant = false;

function triggerTrackpadRipple(clientX, clientY) {
    const rect = trackpad.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    ripple.style.background = 'rgba(229,9,20,0.4)';
    ripple.style.width = ripple.style.height = '40px';
    ripple.style.left = (x - 20) + 'px';
    ripple.style.top = (y - 20) + 'px';
    trackpad.appendChild(ripple);
    ripple.addEventListener('animationend', () => ripple.remove());
}

// Touch events
trackpad.addEventListener('touchstart', (e) => {
    e.preventDefault();
    trackpad.classList.add('active');
    const t = e.touches[0];
    touchStartTime = Date.now();
    touchStartX = t.clientX;
    touchStartY = t.clientY;
    hasMovedSignificant = false;
    lastTouch = { x: t.clientX, y: t.clientY };
    if (isAbsoluteMode) {
        handleTrackpadMove(t.clientX, t.clientY);
    }
}, { passive: false });

trackpad.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
        hasMovedSignificant = true;
    }
    handleTrackpadMove(t.clientX, t.clientY);
}, { passive: false });

trackpad.addEventListener('touchend', (e) => {
    e.preventDefault();
    trackpad.classList.remove('active');
    
    // Tap detection (<250ms and small movement)
    const duration = Date.now() - touchStartTime;
    if (!hasMovedSignificant && duration < 250) {
        channel.send({ type: 'broadcast', event: 'laser-click', payload: {} });
        triggerTrackpadRipple(touchStartX, touchStartY);
    }
    
    lastTouch = null;
}, { passive: false });

// Mouse events (for testing on desktop)
trackpad.addEventListener('mousedown', (e) => {
    trackpad.classList.add('active');
    touchStartTime = Date.now();
    touchStartX = e.clientX;
    touchStartY = e.clientY;
    hasMovedSignificant = false;
    lastTouch = { x: e.clientX, y: e.clientY };
    if (isAbsoluteMode) {
        handleTrackpadMove(e.clientX, e.clientY);
    }
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
});

function onMouseMove(e) {
    const dx = e.clientX - touchStartX;
    const dy = e.clientY - touchStartY;
    if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
        hasMovedSignificant = true;
    }
    handleTrackpadMove(e.clientX, e.clientY);
}

function onMouseUp(e) {
    trackpad.classList.remove('active');
    
    const duration = Date.now() - touchStartTime;
    if (!hasMovedSignificant && duration < 250) {
        channel.send({ type: 'broadcast', event: 'laser-click', payload: {} });
        triggerTrackpadRipple(e.clientX, e.clientY);
    }
    
    lastTouch = null;
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
}

// Scrollpad events
const scrollpad = document.getElementById('scrollpad');
let lastScrollTouchY = null;

scrollpad.addEventListener('touchstart', (e) => {
    e.preventDefault();
    scrollpad.classList.add('active');
    lastScrollTouchY = e.touches[0].clientY;
}, { passive: false });

scrollpad.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (lastScrollTouchY !== null) {
        const currentY = e.touches[0].clientY;
        const dy = (currentY - lastScrollTouchY) * 2.5; // Scroll speed multiplier
        channel.send({ type: 'broadcast', event: 'scroll', payload: { dy: dy } });
        lastScrollTouchY = currentY;
    }
}, { passive: false });

scrollpad.addEventListener('touchend', (e) => {
    e.preventDefault();
    scrollpad.classList.remove('active');
    lastScrollTouchY = null;
}, { passive: false });

// ── Ripple Effect ────────────────────────────────────────────────────────────
function rippleEffect(btn) {
    if (!btn) return;
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    const size = Math.max(btn.offsetWidth, btn.offsetHeight);
    ripple.style.width  = ripple.style.height = size + 'px';
    ripple.style.left   = (btn.offsetWidth / 2  - size / 2) + 'px';
    ripple.style.top    = (btn.offsetHeight / 2 - size / 2) + 'px';
    btn.appendChild(ripple);
    ripple.addEventListener('animationend', () => ripple.remove());
}
// ── Tournament Controls ──────────────────────────────────────────────────────
const TORNEO_PREGUNTAS_REMOTE = [
    { id: 1 }, { id: 2 }, { id: 3 }, { id: 4 }, { id: 5 }
];
let _torneoFaseActual   = 'lobby';
let _torneoPreguntaId   = 1;

async function sendTorneoCmd(cmd) {
    const banner = document.getElementById('torneo-fase-banner');
    try {
        if (cmd === 'lobby' || cmd === 'pregunta' || cmd === 'leaderboard') {
            await client.from('estado_juego').update({
                pantalla_actual:    cmd,
                tiempo_restante:    60,
                pregunta_actual_id: _torneoPreguntaId,
                updated_at:         new Date().toISOString()
            }).eq('id', 'global');
            _torneoFaseActual = cmd;

        } else if (cmd === 'next-question') {
            _torneoPreguntaId = Math.min(5, _torneoPreguntaId + 1);
            await client.from('estado_juego').update({
                pantalla_actual:    'pregunta',
                pregunta_actual_id: _torneoPreguntaId,
                tiempo_restante:    60,
                updated_at:         new Date().toISOString()
            }).eq('id', 'global');
            _torneoFaseActual = 'pregunta';

        } else if (cmd === 'reset-tournament') {
            if (!confirm('¿Resetear el torneo? Se borrarán respuestas y puntajes.')) return;
            await client.from('respuestas').delete().neq('id', '00000000-0000-0000-0000-000000000000');
            await client.from('participantes').update({ puntaje: 0 }).neq('id', '00000000-0000-0000-0000-000000000000');
            await client.from('estado_juego').update({
                pantalla_actual: 'lobby', pregunta_actual_id: 1, tiempo_restante: 60
            }).eq('id', 'global');
            _torneoPreguntaId = 1;
            _torneoFaseActual = 'lobby';
        }

        const btn = event && event.target ? event.target.closest('.btn') : null;
        if (btn) rippleEffect(btn);
        _actualizarFaseBanner(_torneoFaseActual, _torneoPreguntaId);

    } catch (err) {
        if (banner) banner.textContent = '❌ Error: ' + err.message;
    }
}

function _actualizarFaseBanner(fase, pregId) {
    const banner = document.getElementById('torneo-fase-banner');
    if (!banner) return;
    const faseMap = { lobby: '🏠 Lobby', pregunta: `▶ Pregunta ${pregId}`, leaderboard: '🏆 Leaderboard' };
    banner.textContent = 'Torneo: ' + (faseMap[fase] || fase);
    banner.style.color     = fase === 'pregunta' ? '#e50914' : fase === 'leaderboard' ? '#f59e0b' : '#46d369';
    banner.style.borderColor = fase === 'pregunta' ? 'rgba(229,9,20,0.3)' : fase === 'leaderboard' ? 'rgba(245,158,11,0.25)' : 'rgba(70,211,105,0.25)';
}

// Suscribirse a cambios del torneo para reflejar fase actual en el mando
client.channel('remote-torneo-estado')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'estado_juego' }, ({ new: payload }) => {
        _torneoFaseActual = payload.pantalla_actual;
        _torneoPreguntaId = payload.pregunta_actual_id || 1;
        _actualizarFaseBanner(_torneoFaseActual, _torneoPreguntaId);
    })
    .subscribe();

// Cargar estado inicial del torneo
(async () => {
    const { data } = await client.from('estado_juego').select('*').eq('id', 'global').single();
    if (data) {
        _torneoFaseActual = data.pantalla_actual;
        _torneoPreguntaId = data.pregunta_actual_id || 1;
        _actualizarFaseBanner(_torneoFaseActual, _torneoPreguntaId);
    }
})();
</script>
</body>
</html>
